<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechHope</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="app">

        <aside class="sidebar">

            <h1>TechHope</h1>

            <div class="player-box">
                <h2>Jogador</h2>

                <p>⭐ XP: <span id="xp">0</span></p>
                <p>❤️ Vidas: <span id="vidas">3</span></p>
                <p>🔥 Combo: <span id="combo">0</span></p>
            </div>

            <div class="menu">
                <button onclick="iniciarJogo()">
                    Jogar
                </button>
            </div>

        </aside>

        <main class="game-area">

            <div class="top-bar">

                <div class="progress-container">
                    <div class="progress"></div>
                </div>

                <div class="timer">
                    ⏱️ <span id="tempo">15</span>
                </div>

            </div>

            <div class="quiz-card">

                <h2 id="pergunta">
                    Clique em jogar para começar
                </h2>

                <div id="alternativas" class="alternativas">

                </div>

                <p id="mensagem"></p>

            </div>

        </main>

    </div>

    <script src="script.js"></script>

</body>

</html>
